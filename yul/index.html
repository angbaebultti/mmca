<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMCA Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ===== SCROLLBAR HIDE ===== */
        html {
            scrollbar-width: none;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'Inter', 'Arial Black', sans-serif;
            overflow-x: hidden;
            background: #1e1e1e;
            visibility: hidden;
        }

        body.is_ready {
            visibility: visible;
        }

        /* ===== FIXED INTRO ===== */
        #intro_wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            overflow: hidden;
        }

        .bg_layer {
            position: absolute;
            inset: 0;
            background-color: #1e1e1e;
            z-index: 0;
        }

        /* ===== 4-COLUMN LAYOUT (Stage 1~3) ===== */
        .columns_layer {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: flex;
        }

        .letter_col {
            position: relative;
            width: 25%;
            height: 100%;
            overflow: hidden;
        }

        /* 마지막 제외 우측 보더 */
        .letter_col:not(:last-child) {
            border-right: 1px solid rgba(255, 255, 255, 0.12);
        }

        /* 각 컬럼 안의 SVG (글자) */
        .letter_col svg {
            position: absolute;
            overflow: visible;
        }

        .letter_text {
            font-family: 'Inter', 'Arial Black', sans-serif;
            font-weight: 900;
            fill: #1e1e1e;
            stroke: rgba(255, 255, 255, 0.18);
            stroke-width: 1;
            paint-order: stroke fill;
        }

        /* ===== TEXT LAYER (Stage 4) ===== */
        .text_layer {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
        }

        .text_mmca {
            font-size: 18vw;
            font-weight: 900;
            color: #1a1a1a;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        /* ===== SPLIT LAYER (Stage 5) ===== */
        .split_layer {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
        }

        .split_line {
            font-size: 13vw;
            font-weight: 900;
            color: #1a1a1a;
            line-height: 1.05;
            letter-spacing: 0.05em;
        }

        /* ===== SHAPES LAYER (Stage 6) ===== */
        .shapes_layer {
            position: absolute;
            inset: 0;
            z-index: 4;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
        }

        .shapes_grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 220px;
        }

        .shape_box {
            width: 105px;
            height: 90px;
        }

        .shape_rect1 {
            background: #3d3d3d;
        }

        .shape_rect2 {
            background: #1a1a1a;
        }

        .shape_circle {
            width: 105px;
            height: 105px;
            border-radius: 50%;
            background: #1a1a1a;
        }

        .shape_triangle {
            width: 105px;
            height: 95px;
            background: #1a1a1a;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        /* ===== SCROLL SPACER ===== */
        .scroll_spacer {
            height: 700vh;
            pointer-events: none;
        }

        /* ===== SCROLL HINT ===== */
        .scroll_hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.6;
        }

        .scroll_hint span {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .scroll_hint .arrow {
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, 0.3);
            position: relative;
            animation: scroll_arrow 1.5s ease-in-out infinite;
        }

        .scroll_hint .arrow::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 6px;
            height: 6px;
            border-right: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.4);
        }

        @keyframes scroll_arrow {

            0%,
            100% {
                opacity: 0.3;
                transform: translateY(0);
            }

            50% {
                opacity: 1;
                transform: translateY(8px);
            }
        }
    </style>
</head>

<body>

    <div id="intro_wrapper">
        <div class="bg_layer"></div>

        <!-- ===== 4-Column Letters (Stage 1~3) ===== -->
        <div class="columns_layer" id="columns_layer">

            <!-- Column 1: M -->
            <div class="letter_col" id="col_1">
                <svg id="svg_m1" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
                    <text class="letter_text" x="50%" y="72%" text-anchor="middle" font-size="500">M</text>
                </svg>
            </div>

            <!-- Column 2: M -->
            <div class="letter_col" id="col_2">
                <svg id="svg_m2" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
                    <text class="letter_text" x="50%" y="72%" text-anchor="middle" font-size="500">M</text>
                </svg>
            </div>

            <!-- Column 3: C -->
            <div class="letter_col" id="col_3">
                <svg id="svg_c" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
                    <text class="letter_text" x="50%" y="72%" text-anchor="middle" font-size="500">C</text>
                </svg>
            </div>

            <!-- Column 4: A -->
            <div class="letter_col" id="col_4">
                <svg id="svg_a" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid meet">
                    <text class="letter_text" x="50%" y="72%" text-anchor="middle" font-size="500">A</text>
                </svg>
            </div>

        </div>

        <!-- Stage 4: Single line MMCA -->
        <div class="text_layer" id="text_layer">
            <div class="text_mmca">MMCA</div>
        </div>

        <!-- Stage 5: Split MM / CA -->
        <div class="split_layer" id="split_layer">
            <div class="split_line">MM</div>
            <div class="split_line">CA</div>
        </div>

        <!-- Stage 6: Shapes -->
        <div class="shapes_layer" id="shapes_layer">
            <div class="shapes_grid">
                <div class="shape_box shape_rect1"></div>
                <div class="shape_box shape_rect2"></div>
                <div class="shape_circle"></div>
                <div class="shape_triangle"></div>
            </div>
        </div>
    </div>

    <!-- Scroll hint -->
    <div class="scroll_hint" id="scroll_hint">
        <span>Scroll</span>
        <div class="arrow"></div>
    </div>

    <!-- Scroll spacer -->
    <div class="scroll_spacer"></div>

    <!-- Libraries -->
    <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <script>
        history.scrollRestoration = 'manual';
        window.scrollTo(0, 0);
        /* ==========================================
           LENIS + GSAP
        ========================================== */
        const lenis = new Lenis({
            duration: 1.4,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
        });
        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => { lenis.raf(time * 1000); });
        gsap.ticker.lagSmoothing(0);
        gsap.registerPlugin(ScrollTrigger);

        /* ==========================================
           POSITION LETTERS IN COLUMNS
           (Figma: font-size ~1080px, positioned to overflow)
        ========================================== */
        function positionLetters() {
            const vh = window.innerHeight;
            const colW = window.innerWidth / 4;

            const svgH = vh * 1;
            const svgW = svgH;

            document.querySelectorAll('.letter_col svg').forEach((svg, i) => {
                svg.style.width = svgW + 'px';
                svg.style.height = svgH + 'px';
                svg.style.top = ((vh - svgH) / 2 - vh * 0.05) + 'px';

                // MM (col 0,1): centered, CA (col 2,3): right:0
                if (i < 2) {
                    svg.style.left = ((colW - svgW) / 2) + 'px';
                    svg.style.right = 'auto';
                } else {
                    svg.style.left = 'auto';
                    svg.style.right = '0px';
                }
            });
        }

        /* ==========================================
           INIT SVG DRAWING
        ========================================== */
        function initDrawing() {
            const texts = document.querySelectorAll('.letter_text');
            texts.forEach(t => {
                const len = t.getComputedTextLength() * 4;
                t.style.strokeDasharray = len;
                t.style.strokeDashoffset = len;
            });
            return texts;
        }

        /* ==========================================
           SCROLL HINT
        ========================================== */
        const scrollHint = document.getElementById('scroll_hint');
        ScrollTrigger.create({
            trigger: '.scroll_spacer',
            start: 'top top',
            end: '3% top',
            onUpdate: (self) => {
                scrollHint.style.opacity = Math.max(0, 0.6 - self.progress * 3);
            }
        });

        /* ==========================================
           MASTER TIMELINE
        ========================================== */
        function initTimeline(paths) {
            const columnsLayer = document.getElementById('columns_layer');
            const bgLayer = document.querySelector('.bg_layer');
            const textLayer = document.getElementById('text_layer');
            const splitLayer = document.getElementById('split_layer');
            const shapesLayer = document.getElementById('shapes_layer');
            const borders = document.querySelectorAll('.letter_col:not(:last-child)');

            // Col 2 & 4 (M2, A) for vertical shift
            const col2 = document.getElementById('col_2');
            const col4 = document.getElementById('col_4');

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: '.scroll_spacer',
                    start: 'top top',
                    end: 'bottom bottom',
                    scrub: 1.2,
                }
            });

            /* --- STAGE 1: Stroke Drawing (0 → 1) --- */
            paths.forEach((path, i) => {
                tl.to(path, {
                    strokeDashoffset: 0,
                    duration: 0.85,
                    ease: 'none',
                }, 0 + i * 0.08);
            });

            /* --- STAGE 2: Fill (1 → 2) --- */
            tl.to(paths, {
                fill: 'rgba(255,255,255,1)',
                stroke: 'rgba(255,255,255,1)',
                strokeWidth: 1,
                duration: 1,
                ease: 'power2.inOut',
            }, 1);

            /* --- STAGE 3: 2nd & 4th letters drop + color invert (2 → 3) --- */
            tl.to([col2, col4], {
                y: '40vh',
                duration: 1,
                ease: 'power2.inOut',
            }, 2);

            tl.to(bgLayer, {
                backgroundColor: '#ffffff',
                duration: 1,
                ease: 'power2.inOut',
            }, 2);

            tl.to(paths, {
                fill: '#1a1a1a',
                stroke: '#1a1a1a',
                duration: 1,
                ease: 'power2.inOut',
            }, 2);

            tl.to(borders, {
                borderColor: 'rgba(0,0,0,0)',
                duration: 0.5,
                ease: 'power2.inOut',
            }, 2);

            /* --- STAGE 4: Columns → Single text (3 → 4) --- */
            tl.to(columnsLayer, {
                opacity: 0,
                scale: 0.5,
                duration: 0.7,
                ease: 'power2.inOut',
            }, 3);
            tl.to(textLayer, {
                opacity: 1,
                duration: 0.6,
                ease: 'power2.inOut',
            }, 3.4);

            /* --- STAGE 5: Single text → Split (4 → 5) --- */
            tl.to(textLayer, {
                opacity: 0,
                duration: 0.5,
                ease: 'power2.inOut',
            }, 4);
            tl.to(splitLayer, {
                opacity: 1,
                duration: 0.5,
                ease: 'power2.inOut',
            }, 4.3);

            /* --- STAGE 6: Split → Shapes (5 → 6) --- */
            tl.to(splitLayer, {
                opacity: 0,
                duration: 0.5,
                ease: 'power2.inOut',
            }, 5);
            tl.to(shapesLayer, {
                opacity: 1,
                duration: 0.5,
                ease: 'power2.inOut',
            }, 5.3);
            tl.from('.shapes_grid', {
                scale: 0.7,
                duration: 0.7,
                ease: 'power2.out',
            }, 5.3);
        }

        /* ==========================================
           BOOT
        ========================================== */
        document.fonts.ready.then(() => {
            positionLetters();

            requestAnimationFrame(() => {
                const paths = initDrawing();
                initTimeline(paths);
                ScrollTrigger.refresh();
                document.body.classList.add('is_ready');
            });
        });

        window.addEventListener('resize', () => {
            positionLetters();
            ScrollTrigger.refresh();
        });
    </script>
</body>

</html>
